<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景：パープル角丸正方形 -->
  <rect width="64" height="64" rx="14" fill="#534AB7"/>

  <!-- タイマーリング（背景トラック） -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3.5"/>

  <!-- タイマーリング（進行 約75%） -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="3.5"
    stroke-dasharray="122.5 40.8" stroke-linecap="round"
    transform="rotate(-90 32 32)"/>

  <!-- 開いた本 左ページ -->
  <path d="M18 22 C18 21 20 20 25 20 C28.5 20 31 21.5 31 22.5
           L31 43 C29 42 26 41.5 22 42 C19.5 42.5 18 42 18 41 Z"
    fill="white"/>

  <!-- 開いた本 右ページ（やや透明） -->
  <path d="M46 22 C46 21 44 20 39 20 C35.5 20 33 21.5 33 22.5
           L33 43 C35 42 38 41.5 42 42 C44.5 42.5 46 42 46 41 Z"
    fill="rgba(255,255,255,0.7)"/>

  <!-- 本の背表紙ライン -->
  <line x1="32" y1="21" x2="32" y2="43" stroke="#534AB7" stroke-width="1.5" opacity="0.5"/>

  <!-- 左ページの線（文字を表現） -->
  <line x1="21" y1="27" x2="29" y2="26.5" stroke="#534AB7" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
  <line x1="21" y1="30.5" x2="29" y2="30" stroke="#534AB7" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
  <line x1="21" y1="34" x2="27" y2="33.5" stroke="#534AB7" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
</svg>
