name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase token is set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            exit 1
          fi
          echo "Token is set (length: ${#SUPABASE_ACCESS_TOKEN})"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link Supabase project
        run: supabase link --project-ref ltsdsjrzfvbguissmxxw
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair migration history
        run: |
          supabase migration repair --status reverted 20260518 2>/dev/null || true
          supabase migration repair --status reverted 20260520 2>/dev/null || true
          supabase migration repair --status applied 20260518000000 || true
          supabase migration repair --status applied 20260520000000 || true
          supabase migration repair --status applied 20260520120000 || true
          supabase migration repair --status applied 20260521000000 || true
          supabase migration repair --status applied 20260526000000 || true
          supabase migration repair --status applied 20260618000000 || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_99DGzyn9jugmw331mbDew6U6
          VERCEL_PROJECT_ID: prj_y3mFSxJLjiNKJcxGSKt4k9i7NyFD
