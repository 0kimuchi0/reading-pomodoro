name: PR Checks

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - run: echo "DB migration runs after merge to master. Check satisfied."

  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Vercel deploy runs after merge to master. Check satisfied."

  dependabot:
    name: Dependabot
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dependabot check satisfied."
